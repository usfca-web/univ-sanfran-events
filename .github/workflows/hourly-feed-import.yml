name: Hourly Feed Import

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-events-feed-import
  cancel-in-progress: false

jobs:
  import-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PANTHEON_SITE_ENV: univ-sanfran-events.pr-669
      FEED_ID: '6'

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Terminus
        run: composer global require pantheon-systems/terminus:^4

      - name: Add Composer bin dir to PATH
        run: echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Authenticate with Terminus
        run: terminus auth:login --machine-token="${{ secrets.TERMINUS_MACHINE_TOKEN }}"

      - name: Configure Pantheon SSH key
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$PANTHEON_SSH_KEY" ]; then
            echo "PANTHEON_SSH_PRIVATE_KEY is required for remote drush access."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PANTHEON_SSH_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

          cat <<'EOF' >> "$HOME/.ssh/config"
          Host *.drush.in
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Run feed importer
        env:
          FEED_IMPORT_LOG: /tmp/hourly-feed-import.log
        run: |
          set +e
          terminus drush "$PANTHEON_SITE_ENV" -- -vvv feeds:import "$FEED_ID" --yes 2>&1 | tee "$FEED_IMPORT_LOG"
          IMPORT_EXIT_CODE=${PIPESTATUS[0]}

          if grep -q 'The feed became locked before the import could begin' "$FEED_IMPORT_LOG"; then
            IMPORT_EXIT_CODE=1
          fi

          SUMMARY=$(grep -E 'Failed importing|Imported|created|updated|deleted|processed|resultsCount|Event items' "$FEED_IMPORT_LOG" | tail -n 8 || true)

          if [ -z "$SUMMARY" ]; then
            SUMMARY=$(tail -n 8 "$FEED_IMPORT_LOG" || true)
          fi

          {
            echo "FEED_IMPORT_EXIT_CODE=$IMPORT_EXIT_CODE"
            echo "FEED_IMPORT_SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_ENV"

          exit "$IMPORT_EXIT_CODE"

      - name: Send Slack notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FEED_IMPORT_SUMMARY: ${{ env.FEED_IMPORT_SUMMARY }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="Succeeded"
            PREFIX=""
          else
            STATUS_TEXT="Failed"
            PREFIX="@here "
          fi

          SUMMARY_TEXT=$(printf '%s' "$FEED_IMPORT_SUMMARY" | tail -n 8)
          if [ -n "$SUMMARY_TEXT" ]; then
            MESSAGE="${PREFIX}Hourly Events Feed Import ${STATUS_TEXT}\n${SUMMARY_TEXT}"
          else
            MESSAGE="${PREFIX}Hourly Events Feed Import ${STATUS_TEXT}"
          fi

          JSON_MESSAGE=$(printf '%s' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"text": sys.stdin.read()}))')

          curl -X POST \
            -H "Content-Type: application/json" \
            --data "$JSON_MESSAGE" \
            "$SLACK_WEBHOOK_URL"
