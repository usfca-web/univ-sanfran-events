name: Hourly Feed Import

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-events-feed-import
  cancel-in-progress: false

jobs:
  import-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      PANTHEON_SITE_ENV: univ-sanfran-events.pr-669
      FEED_IMPORT_SUMMARY_FILE: /tmp/hourly-feed-import-summary.txt

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Terminus
        run: composer global require pantheon-systems/terminus:^4

      - name: Add Composer bin dir to PATH
        run: echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Authenticate with Terminus
        run: terminus auth:login --machine-token="${{ secrets.TERMINUS_MACHINE_TOKEN }}"

      - name: Configure Pantheon SSH key
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$PANTHEON_SSH_KEY" ]; then
            echo "PANTHEON_SSH_PRIVATE_KEY is required for remote drush access."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PANTHEON_SSH_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

          cat <<'EOF' >> "$HOME/.ssh/config"
          Host *.drush.in
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Run feed importer
        run: |
          set +e
          FEED_IDS=(33 32 31 30 29 28 6)
          declare -A TYPE_IDS=(
            [33]=31
            [32]=29
            [31]=23
            [30]=13
            [29]=8
            [28]=5
            [6]=14
          )

          : > "$FEED_IMPORT_SUMMARY_FILE"
          OVERALL_EXIT_CODE=0

          for FEED_ID in "${FEED_IDS[@]}"; do
            TYPE_ID="${TYPE_IDS[$FEED_ID]}"
            FEED_IMPORT_LOG="/tmp/hourly-feed-import-${FEED_ID}.log"

            echo "Importing feed ID ${FEED_ID} for Type ID ${TYPE_ID}..."
            terminus drush "$PANTHEON_SITE_ENV" -- -vvv feeds:import "$FEED_ID" --yes 2>&1 | tee "$FEED_IMPORT_LOG"
            IMPORT_EXIT_CODE=${PIPESTATUS[0]}

            if grep -q 'The feed became locked before the import could begin' "$FEED_IMPORT_LOG"; then
              IMPORT_EXIT_CODE=1
            fi

            if [ "$IMPORT_EXIT_CODE" -eq 0 ]; then
              STATUS_TEXT="Succeeded"
            else
              STATUS_TEXT="Failed"
              OVERALL_EXIT_CODE=1
            fi

            SUMMARY=$(grep -E '\[info\].*(Failed importing|Imported|created|updated|deleted|processed|resultsCount|Event items|There are no new)' "$FEED_IMPORT_LOG" | tail -n 5 || true)

            if [ -z "$SUMMARY" ]; then
              SUMMARY=$(grep -v '\[notice\] Message:' "$FEED_IMPORT_LOG" | tail -n 5 || true)
            fi

            {
              echo "Feed ID ${FEED_ID} (Type ID ${TYPE_ID}): ${STATUS_TEXT}"
              if [ -n "$SUMMARY" ]; then
                printf '%s\n' "$SUMMARY" | sed 's/^/  /'
              fi
              echo
            } >> "$FEED_IMPORT_SUMMARY_FILE"
          done

          {
            echo "FEED_IMPORT_SUMMARY<<EOF"
            cat "$FEED_IMPORT_SUMMARY_FILE"
            echo "EOF"
          } >> "$GITHUB_ENV"

          exit "$OVERALL_EXIT_CODE"

      - name: Send Slack notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FEED_IMPORT_SUMMARY: ${{ env.FEED_IMPORT_SUMMARY }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="Succeeded"
            PREFIX=""
          else
            STATUS_TEXT="Failed"
            PREFIX="@here "
          fi

          SUMMARY_TEXT=$(printf '%s' "$FEED_IMPORT_SUMMARY")
          if [ -n "$SUMMARY_TEXT" ]; then
            MESSAGE="${PREFIX}Hourly Events Feed Import ${STATUS_TEXT}\n${SUMMARY_TEXT}"
          else
            MESSAGE="${PREFIX}Hourly Events Feed Import ${STATUS_TEXT}"
          fi

          JSON_MESSAGE=$(printf '%s' "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps({"text": sys.stdin.read()}))')

          curl -X POST \
            -H "Content-Type: application/json" \
            --data "$JSON_MESSAGE" \
            "$SLACK_WEBHOOK_URL"
