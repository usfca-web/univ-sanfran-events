name: Hourly Feed Import

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  import-feed:
    runs-on: ubuntu-latest
    env:
      PANTHEON_SITE_ENV: univ-sanfran-events.pr-669
      FEED_ID: '6'

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Terminus
        run: composer global require pantheon-systems/terminus:^4

      - name: Add Composer bin dir to PATH
        run: echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Authenticate with Terminus
        run: terminus auth:login --machine-token="${{ secrets.TERMINUS_MACHINE_TOKEN }}"

      - name: Run feed importer
        id: feed_import
        run: terminus drush "$PANTHEON_SITE_ENV" -- feeds:import "$FEED_ID" -y

      - name: Send Slack notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="completed successfully"
            STATUS_EMOJI=":white_check_mark:"
          else
            STATUS_TEXT="failed"
            STATUS_EMOJI=":x:"
          fi

          payload=$(cat <<EOF
          {
            "text": "${STATUS_EMOJI} ${WORKFLOW_NAME} ${STATUS_TEXT}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${STATUS_EMOJI} *${WORKFLOW_NAME}* ${STATUS_TEXT}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${REPOSITORY}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${BRANCH_NAME}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Pantheon Env:*\n${PANTHEON_SITE_ENV}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Feed ID:*\n${FEED_ID}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Run:* <${RUN_URL}|GitHub Actions run #${RUN_NUMBER}>"
                }
              }
            ]
          }
          EOF
          )

          curl -X POST \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
