name: Hourly Feed Import

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  import-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PANTHEON_SITE_ENV: univ-sanfran-events.pr-669
      FEED_ID: '6'

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Terminus
        run: composer global require pantheon-systems/terminus:^4

      - name: Add Composer bin dir to PATH
        run: echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Authenticate with Terminus
        run: terminus auth:login --machine-token="${{ secrets.TERMINUS_MACHINE_TOKEN }}"

      - name: Configure Pantheon SSH key
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$PANTHEON_SSH_KEY" ]; then
            echo "PANTHEON_SSH_PRIVATE_KEY is required for remote drush access."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PANTHEON_SSH_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

          cat <<'EOF' >> "$HOME/.ssh/config"
          Host *.drush.in
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Run feed importer
        run: terminus drush "$PANTHEON_SITE_ENV" -- -vvv feeds:import "$FEED_ID" --yes

      - name: Send Slack notification
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping Slack notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="Succeeded"
          else
            STATUS_TEXT="Failed"
          fi

          curl -X POST \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"Hourly Feed Import ${STATUS_TEXT}\"}" \
            "$SLACK_WEBHOOK_URL"
